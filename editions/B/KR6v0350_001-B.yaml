body:
  text: 札迦大師說民國苾蒭釋法尊譯菩提道次恆常修法敬禮曼殊室利菩薩我等欲以修菩提心為主要者有慈氏菩薩傳無著菩薩修菩提心法及曼殊菩薩傳靜天菩薩修菩提心之二派慈氏菩薩所傳由七重因果門修法中初修知母者謂諸有情無一可云未為父母故應修云如我生生無有始際如是一一有情為作慈母亦皆無量二修念恩者謂應修云如我現世父母恩育如是一切諸有情類為父母時悉皆大恩三修報恩者謂應修云此諸有情昔唯於我廣作恩我於此等未曾恩酬今於現法應正報恩四修可意慈者我等今者將諸有情分為二品謂諸可意及不可意然諸有情悉是父母更有何理而非可意由諸有情悉父母故隨其所見一一有情應修悅意起是念云此皆父母皆是恩者五於有情所修悲愍者謂應修云此諸有情墮則墮於生死海中受則無間受三苦惱實可悲愍更修悲云為此一切有情利故唯願獲得無上珍寶佛勝道已速令解脫生死流轉六修增上意樂者謂應修云一切慈母諸有情類匱乏安樂苦惱逼切願此一切諸有情類悉具安樂離眾苦惱及苦惱因斯唯應我獨一負荷故我願將此諸有情獲樂離苦安立佛地七修菩提心者謂應念云我自今日為利一切諸有情故願我速得等正覺位如是名修願菩提心我從今日為利一切諸有情故唯願速得勝菩提道是為修習行菩提心曼殊菩薩傳靜天菩薩由自他換門修菩提心中初修自他平等者謂應修云自他有情欣樂厭苦一切所同猶有何緣分別親疏妄起貪瞋次修自他換者謂於先時愛自棄他今後應修愛他棄自令彼二心執位換易其後應如前所說願行二心由儀軌受願行心者諸佛及菩薩唯願憶念我如昔諸善逝發大菩提心於菩提學處如次而安住我為利有情亦發菩提心於菩薩學處如次當修學三念完時應起獲得菩薩律儀勝解次生喜云我今有果利善獲得人身今生佛家中復得為佛子我今應勵力作順種族業無穢淨種中應順無濁行菩提道次第恆修補足敬禮曼殊室利童子茲已摘出修學珍寶菩提心法今應略書彼補足中淨治下中士夫覺慧如宗喀巴大師云暇滿難得壽無暇意修能息現法境應如是修我等有暇珍寶依止此唯長時集福所致非以僥倖而能得此勝身依止此暇滿因須以斷除十種不善淨戒為基復須施等以為助伴無垢淨願結合其間然今我等豈能修此少分因耶又應修念今若徒失此暇滿身如此之身後則難得如是修習能息貪著現法境界乃至於此現法富樂衣食豐足等未見無利未息耽著恆應修習又應修云我今壽命短促無暇不能久住速至死際大師又云業果無欺生死苦數思能息後世境謂應修云我等除此諸惡業未作餘業其業異熟亦唯成熟於自己身非於他身其果可熟由諸業果無欺誑故彼果至時何能堪忍如是非僅業果無欺即凡任墮生死中者悉為三苦無間逼惱若思及此豈能不生極大怖畏猶如生存擲諸火坑此上是修下中士夫覺心方便如是乃至於自相續生死耽著未息以來應於多門思惟修習若能乃至於此生死耽著止息晝夜時中唯求解脫心未生來恆修習者若時起心唯欲解脫生死苦惱爾時乃是出離心生彼出離心若無清淨發心攝受仍非能得無上佛因如云若無清淨發心持彼出離心終不成無上菩提樂因故智者應發菩提心如是出離及菩提心並正見三讚為三種最殊勝道故於生死先應策心厭捨出離次應從此出離生死勝意樂中極為引發勝菩提心一切道身悉攝於此故應於此善修覺慧由於無始來極串習故現在自心任運於此五種取蘊計我心生彼即無謬我見行相彼計自體五取蘊法為自我者若彼五蘊實是我者如蘊有五我亦應成異體五我不應正理又我唯一如是五蘊亦應成一不符正理若謂有一離蘊我者應將諸蘊一一除遣除蘊之餘應有所示謂此是我彼亦無故不應正理宗喀巴大師說於此中應以四種要義觀察最為切要謂我等乃至極重睡眠一切時位心中恆堅執我而住此即生死根本薩迦耶見是為初要所破决定義然所破我與五聚似和雜有非離蘊外別有我現第二切要周徧决定要義者謂觀此我與所設依止五種蘊聚為一為異更無所餘第三可得是名周徧要義第三離諦實一决定要者謂我與蘊若是一者如蘊有五隨於一人應有五我便成過失又應如我唯一無長如是五蘊亦應成一仍是過失第四離諦實異决定要者謂若異者除諸蘊後應有獨我第二抉擇修學法無我義有二謂抉擇修有為無性及抉擇修無為無性初中有三謂色心及不相應行初譬如身謂非唯於骨肉等事五支和合假身體上以分別心而強設施定覺有一自性實身於我等心顯現莫止是為所破顯現道理若如是身於骨肉粗事五支和合上有則應與此骨肉粗事五支假體或一或異若謂一者此骨肉等粗事五支和雜之身由自父母不淨成故則識最初所託所依二滴不淨亦應成就骨肉等事粗重五支和雜之身如支有五身亦應成五支和五若謂異者應除頭等一一支後餘有可見實身為此然如是身實非有故應作是念如所執身畢竟是無引起定知將護修習第二譬如今日之識謂若非唯於今日中午前午後二識之上由分別心假設建立定執有一自性真實今日識者則與今日午前午後二識相望或一或異若謂一者則於今日午前識上應有今日午後識住若謂異者則將今日午前午後二識除已應另餘有今日識在而實不爾故如是識畢竟非有引起定知如前修習第三以時一年為例謂非唯於年設所依十二月上分別假立執有自性年可得者與十二月或一或異若謂一者月有十二如是年亦應成十二若謂異者十二月分一一除後應有實年亦云即此彼非有故如是實年畢竟為無如前引起定知修習第二抉擇修習無為無性者譬如虛空方隅虛空有多分故應與彼分若異若一如前觀察引起定知修習無實總之若我若蘊山城宅舍生死涅槃一切諸法下至無有極微塵許非分別設實自性法於此定知專一修習住等引時皆如虛空後得一切境界顯現任運而知悉無實性唯依因緣和合而起其性虛偽是名後得如幻瑜伽由善修習二種瑜伽為所依止以觀察力引發身心二種輕安即以輕安之所攝持三摩呬多建立名為行相圓滿毘鉢舍那况得修此第一道如同大師所教誨聞名亦慶具善根我等乃至壽未沒唯應專一善修此修止記錄至極須要敬禮恩師妙吉祥菩薩如云滅除五過失勤修八斷行必須由依能滅五過八對治行門中修習於三摩地起方便時懈怠是過彼有四事能為對治謂見定德所起信心及於正定希求欲心於三摩地勤修精進及勤勇果所有輕安正精進修三摩地時忘記聖言是其過失念能治彼其念亦非僅不忘記正所緣事必須令心於所緣事專一緣慮并與最極明利定知策勵隨行平等安住三摩地時沉掉二法是彼過患正知治彼謂由正知善察沈掉為生未生上慧行者沉掉初起能知能斷中慧行者起已無間劣慧行者亦須沉掉生已未久能知能斷若爾惛昧與沉掉二差別云何答於所緣事極不明了身心重墜為行相者是名為惛若心黑暗及於所緣心雖不散然無澄分及明顯相念力羸劣是粗分沉若時雖有澄明二分然於所緣決定印知策力稍緩是微細沉能治此者謂思三寶真實功德思惟作意諸光明相及將風心與虛空合諸教授等若心於所緣事不能安住無動亂相稍流蕩者是微細沉對治此者依念知極苦修習若依念知猶不能住流趣愛境者是粗掉舉能治此者應修無常三惡趣苦及生死苦并修猛利斷掉方便諸教授等沉掉起時不作行者是為過失能治此者謂於現掉生已無間正了知已修能斷行又若彼心於所緣事極為勵力知明利者明分雖有然掉舉增盛住分難得若不勵力極緩慢者雖有住分然沉勢增加明分難得是故自測其心若覺自心高量齊此掉舉生者則稍緩住若覺住此有沉起者則應稍舉令適中住此二中間先從掉舉攝錄其心尋求住分住分起時謹防沉沒令心明利明分出生於此二分輪次將護以此成辦無過等持不應保信無決定知明利明分僅有少許澄淨之心如是細分沉掉皆滅心於等持相續轉時作行是過治此過者謂不作行沉掉對治緩住於捨五過八行辨中邊論修四神足時廣說由如是理義修習故漸次能得九種住心亦當成就身心輕安正奢摩他願依堅固止住毘鉢舍那盡拔諸煩惱所知障過失恆常相續修止記錄極不宜離敬禮三恩本師曼殊室利菩薩寂止所緣雖有多種緣能仁像修尤為重要謂於顯教能隨念佛於密乘中隨順修習本尊瑜珈故義極重以六力門能生無過九種住心四種作意勝三摩地彼修法者謂六力中初以聞力能成九種住心中初正在心此是最初隨其所聞正教授義內攝其心令善安住於此時中有內心現能識分別謂內自覺分別繁多如陡坂上極瀑流水二由思力能成第二相續住心謂前初心安住所緣所有相續今數思惟將護修習此亦令彼流轉稍能連屬門中將護相續爾時內覺諸妄分別暫有止息謂內自覺所有分別時起時沒如峽澗水此二住心三摩地少沉掉眾多心於所緣須極策勵方能攀緣故是四種作意之中最初勵力運轉時位三由念力能成二心謂三安住及四近住如其次第心從所緣若時流散速疾憶念先所緣境仍於所緣安置令住又於最初發起念力决不令其散失所緣并將內心從寬緩性漸漸收攝令住微細高上境性安住心時於諸分別起疲勞想謂內自覺所有分別如山岔處所有池水無逆緣擾似能安住若遇違緣仍不安止第四由其正知力故能成二心謂五調伏及六寂靜如其次第先由正知了知流散於分別相及隨惑相所有過患制令不流於三摩地令發欣喜而調伏之又以正知了知散亂所有過患於三摩地息滅不喜令心寂靜第五由其精進力故能成二心謂七住心最極寂靜及第八心專一所緣如其次第下至微細分別隨惑亦勤功用斷而不受令極寂靜又以是力令沉掉等於三摩地無能障難成就無間相續等持從三住心乃至第七此五雖能多分安住然為沉掉數數間缺是為第二有間運轉作意之位第八住心時內心自覺分別作行謂諸分別如大海浪隨分別起略依念治任運寂滅無諸形跡爾時雖須恆依功用然諸沉掉無力障難能常時修是為第三作意之位謂無間缺運轉作意第六由其串習力故能成第九等住住心謂不復須恆時依止念知功用已起正定任運轉趣所緣境故爾時沉掉不能障難復不恆常依功用故是為第四無有功用任運運轉作意之位如是第九住心是為欲界心一境性隨奢摩他若爾真奢摩他齊何量耶謂由獲得身心輕安位莊嚴經論云修彼不作行次得彼身心廣大輕安已有作意應知言作意者即奢摩他若爾輕安其相云何如集論云安者止息身心粗重身心調暢為體除遣一切障礙為業言粗重者謂自身心於諸善事如其所欲無有堪能若時得能治彼輕安止息身心無堪能性轉成至極調暢隨行又彼身心圓滿堪能初得定時已生細分次漸增盛轉成輕安及專一境真奢摩他又彼眾相圓滿易知輕安將生所有前相謂覺頂上似重相起然非苦相彼起無間離心粗重能治粗重心輕安生次由依彼輕安生力有能引發身輕安風於身中轉若彼風轉充徧全體時身粗重悉皆遠離能治身重身輕安生次由彼力引發身體廣大安樂由彼樂力復能引發慰意適悅心內輕安次復引生勝身輕安心中亦起最極殊勝歡喜踴躍自此之後先發輕安勢力漸緩然非輕安息滅退失謂初起觸躁動內心粗觸退已有不動亂微妙輕安隨順定轉如影隨身心中喜躍亦漸退沒心於所緣依止安住遠離躍動不寂靜相是為獲得真奢摩他此奢摩他是初靜慮近分所攝是為獲得等引地中少分作意外道諸仙由世間道乃至遠離無所有處以下諸貪及神通等皆須依止奢摩他修內道由以真出離心及菩提心勢力任持修習無我證得解脫及徧智地亦須依此奢摩他修故此寂止是內外道二所共同民國十九年腊月五夜譯於川邊甘孜札迦山林避囂茅室
